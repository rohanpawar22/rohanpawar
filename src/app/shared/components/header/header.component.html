<header class="header">
  <div class="header__container">
    <!-- Logo -->
    <div class="header__logo" (click)="navigateTo('hero')">
      <span class="header__logo-text">RP</span>
    </div>

    <!-- Desktop Navigation -->
    <nav class="header__nav" [class.header__nav--open]="mobileMenuOpen()">
      <ul class="header__nav-list">
        @for (item of navItems; track item.sectionId) {
          <li class="header__nav-item">
            <button 
              class="header__nav-link" 
              (click)="navigateTo(item.sectionId)"
              [attr.aria-label]="'Navigate to ' + item.label"
              type="button">
              <mat-icon class="header__nav-icon">{{ item.icon }}</mat-icon>
              <span class="header__nav-label">{{ item.label }}</span>
            </button>
          </li>
        }
      </ul>
    </nav>

    <!-- Theme Toggle & Mobile Menu -->
    <div class="header__actions">
      <!-- Theme Toggle Button -->
      <button 
        class="header__theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="'Switch to ' + (currentTheme() === 'light' ? 'dark' : 'light') + ' mode'"
        type="button">
        @if (currentTheme() === 'light') {
          <!-- Moon Icon -->
          <svg class="header__theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        } @else {
          <!-- Sun Icon -->
          <svg class="header__theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        }
      </button>

      <!-- Mobile Menu Toggle -->
      <button 
        class="header__mobile-toggle"
        (click)="toggleMobileMenu()"
        [attr.aria-label]="mobileMenuOpen() ? 'Close menu' : 'Open menu'"
        [attr.aria-expanded]="mobileMenuOpen()"
        type="button">
        <span class="header__hamburger" [class.header__hamburger--open]="mobileMenuOpen()">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu Overlay -->
  @if (mobileMenuOpen()) {
    <div class="header__overlay" (click)="closeMobileMenu()"></div>
  }
</header>
