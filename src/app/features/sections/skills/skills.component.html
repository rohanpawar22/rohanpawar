<section id="skills" class="skills">
  <div class="skills__container">
    <!-- Section Header -->
    <div class="skills__header">
      <span class="skills__label">Technical Skills</span>
      <h2 class="skills__title">Expertise & Tools</h2>
    </div>

    <!-- Skills Grid -->
    <div class="skills__grid">
      @for (category of skillCategories; track category.title) {
        <mat-card appScrollAnimation class="skills__category" appearance="outlined">
          <mat-card-header class="skills__category-header">
            <mat-icon mat-card-avatar class="skills__category-icon">folder_special</mat-icon>
            <mat-card-title>
              <h3 class="skills__category-title">{{ category.title }}</h3>
            </mat-card-title>
          </mat-card-header>
          
          <mat-card-content class="skills__category-content">
            <div class="skills__list">
              @for (skill of category.skills; track skill.name) {
                <div class="skills__skill-item">
                  <div class="skills__skill-info">
                    @if (skill.icon) {
                      <mat-icon class="skills__skill-icon">{{ skill.icon }}</mat-icon>
                    }
                    <span class="skills__skill-name">{{ skill.name }}</span>
                  </div>
                </div>
              }
            </div>
          </mat-card-content>
        </mat-card>
      }
    </div>
  </div>
</section>
