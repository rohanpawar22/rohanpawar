<section id="about" class="about">
  <div class="about__container">
    <!-- Section Header -->
    <div class="about__header" appScrollAnimation>
      <span class="about__label">About Me</span>
      <h2 class="about__title">Professional Background</h2>
    </div>

    <div class="about__content">
      <!-- Left Side: Description -->
      <div class="about__text" appScrollAnimation>
        <p class="about__description">
          {{ aboutText }}
        </p>

        <div class="about__expertise">
          <h3 class="about__expertise-title">Core Expertise</h3>
          <ul class="about__expertise-list">
            @for (item of expertise; track item; let i = $index) {
              <li class="about__expertise-item" appScrollAnimation>
                <span class="about__expertise-icon">▹</span>
                {{ item }}
              </li>
            }
          </ul>
        </div>
      </div>

      <!-- Right Side: Trait Cards -->
      <div class="about__stats">
        @for (stat of highlights; track stat.title) {
          <div class="about__stat-card" appScrollAnimation>
            <div class="about__stat-icon" [style.background]="stat.iconBg">
              <mat-icon>{{ stat.matIcon }}</mat-icon>
            </div>
            <div class="about__stat-body">
              <h4 class="about__stat-title">{{ stat.title }}</h4>
              <p class="about__stat-desc">{{ stat.description }}</p>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
