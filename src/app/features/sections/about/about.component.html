<section id="about" class="about">
  <div class="about__container">
    <!-- Section Header -->
    <div class="about__header">
      <span class="about__label">About Me</span>
      <h2 class="about__title">Professional Background</h2>
    </div>

    <div class="about__content">
      <!-- Left Side: Description -->
      <div class="about__text">
        <p class="about__description">
          {{ aboutText }}
        </p>

        <div class="about__expertise">
          <h3 class="about__expertise-title">Core Expertise</h3>
          <ul class="about__expertise-list">
            @for (item of expertise; track item) {
              <li class="about__expertise-item">
                <span class="about__expertise-icon">▹</span>
                {{ item }}
              </li>
            }
          </ul>
        </div>
      </div>

      <!-- Right Side: Stats -->
      <div class="about__stats">
        @for (stat of highlights; track stat.label) {
          <div class="about__stat-card">
            <div class="about__stat-value">{{ stat.value }}</div>
            <div class="about__stat-label">{{ stat.label }}</div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
